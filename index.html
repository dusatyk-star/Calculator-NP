<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NP Expeditor Calc Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://vsetut.pl/uploads/news/images/840_460/1449673418-novaposhta.png">
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        :root { --np-red: #e30613; --np-dark: #231f20; --np-grey: #f2f2f2; --np-border: #d1d1d1; }
        body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background-color: var(--np-grey); margin: 0; padding: 15px; color: var(--np-dark); }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid var(--np-red); }
        h1 { text-align: center; color: var(--np-red); text-transform: uppercase; font-size: 20px; letter-spacing: 1px; margin-bottom: 20px; }
        button { width: 100%; padding: 12px; background-color: var(--np-red); color: white; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-scan { background-color: #2e7d32; }
        .btn-secondary { background-color: var(--np-dark); }
        .debug-toggle { display: block; text-align: center; font-size: 12px; color: #666; margin-bottom: 20px; background: #fff3cd; padding: 8px; border-radius: 6px; border: 1px solid #ffeeba; }
        #ocr-status { display: none; background: #fff3cd; color: #856404; padding: 12px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; text-align: center; font-weight: bold; }
        .history-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        .history-table th { background-color: var(--np-red); color: white; padding: 10px; font-size: 12px; }
        .history-table td { border: 1px solid var(--np-grey); padding: 10px; text-align: center; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Нова Пошта: Експедитор</h1>

    <button class="btn-scan" onclick="document.getElementById('scrFiles').click()">📸 АВТОВВЕДЕННЯ ЗІ СКРІНШОТІВ</button>
    <input type="file" id="scrFiles" accept="image/*" multiple style="display:none" onchange="scanScreenshots(this)">
    
    <label class="debug-toggle">
        <input type="checkbox" id="debug-mode"> 🛠 Режим діагностики
    </label>

    <div id="ocr-status">Очікування...</div>
    
    <div id="current-shift">
        <input type="text" id="address-title" placeholder="Адреса (якщо порожньо — назве Адреса 1)">
        <input type="number" id="weight" step="0.01" placeholder="Вага (кг)">
        <input type="number" id="en-count" placeholder="Кількість ЕН">
        <button onclick="addAddress()">ДОДАТИ ВРУЧНУ</button>
        <div id="addresses-log"></div>
        <button class="btn-secondary" onclick="saveShift()">ЗБЕРЕГТИ ЗМІНУ</button>
    </div>

    <table class="history-table">
        <tbody id="history-rows"></tbody>
    </table>
</div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    // ТУТ МАЄ БУТИ ТВОЯ ЛОГІКА (функції scanScreenshots, addAddress і т.д.)
    // ... (весь твій попередній JavaScript код) ...
</script>

</body>
</html>

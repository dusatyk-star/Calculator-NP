<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NP Expeditor Calc Pro</title>
    <link rel="icon" type="image/png" href="https://vsetut.pl/uploads/news/images/840_460/1449673418-novaposhta.png">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --np-red: #e30613; --np-dark: #231f20; --np-grey: #f2f2f2; }
        body { font-family: sans-serif; background-color: var(--np-grey); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 8px solid var(--np-red); }
        h1 { text-align: center; color: var(--np-red); text-transform: uppercase; font-size: 20px; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; background-color: var(--np-red); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-scan { background-color: #2e7d32; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .debug-box { text-align: center; font-size: 12px; margin-bottom: 20px; padding: 10px; background: #fff3cd; border-radius: 6px; }
        #ocr-status { display: none; padding: 10px; background: #d4edda; text-align: center; margin-bottom: 15px; border-radius: 6px; }
        .address-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <h1>Нова Пошта: Експедитор</h1>
    <button class="btn-scan" onclick="document.getElementById('scrFiles').click()">📸 АВТОВВЕДЕННЯ ЗІ СКРІНШОТІВ</button>
    <input type="file" id="scrFiles" accept="image/*" multiple style="display:none" onchange="scanScreenshots(this)">
    
    <label class="debug-box"><input type="checkbox" id="debug-mode"> 🛠 Режим діагностики</label>
    <div id="ocr-status">Очікування...</div>

    <input type="text" id="address-title" placeholder="Адреса (наприклад, Адреса 1)">
    <input type="number" id="weight" step="0.01" placeholder="Вага (кг)">
    <input type="number" id="en-count" placeholder="Кількість ЕН">
    <button onclick="addAddress()">ДОДАТИ ВРУЧНУ</button>
    
    <div id="addresses-log"></div>
    <button style="background-color: var(--np-dark);" onclick="saveShift()">ЗБЕРЕГТИ ЗМІНУ</button>
</div>

<script>
    let currentAddresses = [];
    async function scanScreenshots(input) {
        const files = input.files;
        if (files.length === 0) return;
        const statusBox = document.getElementById('ocr-status');
        statusBox.style.display = 'block';
        statusBox.innerText = "⏳ Обробка...";

        for (let file of files) {
            const imgUrl = URL.createObjectURL(file);
            const { data: { text } } = await Tesseract.recognize(imgUrl, 'ukr+eng');
            URL.revokeObjectURL(imgUrl);

            if (document.getElementById('debug-mode').checked) alert(text);

            let cleanText = text.replace(/Материнська[^\n]*/gi, '');
            let weight = 0, enCount = 1;

            const wMatch = cleanText.match(/(?:Вага|Bara|вага)[^\d]*([\d.,]+)/i);
            if (wMatch) weight = parseFloat(wMatch[1].replace(',', '.'));

            const enMatch = cleanText.match(/(?:ЕН|EH|Е\s*Н|E\s*H)[^\d]{0,5}(\d{1,3})/i);
            if (enMatch) enCount = parseInt(enMatch[1]);

            if (weight > 0) {
                currentAddresses.push({ title: `Адреса ${currentAddresses.length + 1}`, weight, enCount });
            }
        }
        statusBox.innerText = "✅ Готово!";
        renderList();
    }

    function addAddress() {
        const t = document.getElementById('address-title').value || `Адреса ${currentAddresses.length + 1}`;
        const w = parseFloat(document.getElementById('weight').value);
        const e = parseInt(document.getElementById('en-count').value) || 1;
        if (!isNaN(w)) { currentAddresses.push({ title: t, weight: w, enCount: e }); renderList(); }
    }

    function renderList() {
        const log = document.getElementById('addresses-log');
        log.innerHTML = currentAddresses.map((a, i) => `<div class="address-item">${a.title}: ${a.weight} кг | ${a.enCount} ЕН</div>`).join('');
    }

    function saveShift() { alert("Зміна збережена!"); currentAddresses = []; renderList(); }
</script>
</body>
</html>
